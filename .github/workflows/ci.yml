name: Run CI
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md' # Do not need to run CI for markdown changes.
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

jobs:
  lint:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/lint

  build-ios:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/build-ios
        with:
          ios-sim: 'platform=iOS Simulator,name=iPhone 16'

  build-macos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/build-macos

  build-tvos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/build-tvos

  build-watchos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/build-watchos

  test-swiftpm:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/test-swiftpm

  contract-tests:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/contract-tests
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-docs:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: 16.4

      - uses: ./.github/actions/build-docs

  linux-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        swift-version:
          - 5.7
          - 5.8
          - 5.9

    container: swift:${{ matrix.swift-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: swift test --enable-test-discovery

  windows-build:
    name: Windows - Swift 6.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: compnerd/gha-setup-swift@cd348eb89f2f450b0664c07fb1cb66880addf17d
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE
      - name: Build and test
        run: swift test
